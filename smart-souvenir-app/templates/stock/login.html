<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Login Dashboard Stok</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('stock.static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center" style="min-height:100vh;">
  <div class="blob-c">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card glass-card border-0 p-3 shadow-lg">
          <div class="card-body">
            <div class="text-center mb-4">
              <div class="d-inline-flex align-items-center justify-content-center p-3 rounded-circle bg-white bg-opacity-50 mb-3 shadow-sm" style="width: 60px; height: 60px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #6366f1;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
              </div>
              <h4 class="fw-bold mb-1">Smart Stock</h4>
              <p class="text-secondary small">Masuk untuk mengelola stok barang</p>
            </div>

            {% if error %}
              <div class="alert alert-danger py-2 border-0 bg-danger bg-opacity-10 text-danger rounded-3 text-center small mb-3">{{ error }}</div>
            {% endif %}

            <form method="post">
              <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">Email</label>
                <input type="text" name="email" class="form-control" required placeholder="name@domain.com">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
              </div>
              <button class="btn btn-glass-primary w-100 py-2.5 mt-2" type="submit">Login</button>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
