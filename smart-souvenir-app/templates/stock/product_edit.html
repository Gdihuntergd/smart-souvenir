{% extends 'layout.html' %}

{% block content %}
<div class="d-flex flex-column mb-4 animate__animated animate__fadeIn">
  <h3 class="fw-bold mb-1">Edit Produk</h3>
  <p class="text-secondary mb-0">Ubah informasi detail produk Anda</p>
</div>

<form method="post" class="card glass-card border-0 p-4 shadow animate__animated animate__fadeInUp">
  <input type="hidden" name="id" value="{{ product.id }}">
  
  <div class="mb-3">
    <label class="form-label small fw-semibold text-secondary">Nama Produk *</label>
    <input type="text" name="name" class="form-control" required value="{{ product.name }}">
  </div>
  
  <div class="mb-3">
    <label class="form-label small fw-semibold text-secondary">Kategori *</label>
    <select name="category_id" class="form-select" required>
      <option value="" hidden>Pilih kategori</option>
      {% for c in cats %}
        <option value="{{ c.id }}" {{ 'selected' if product.category_id == c.id else '' }}>
          {{ c.name }}
        </option>
      {% endfor %}
    </select>
  </div>
  
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label small fw-semibold text-secondary">Harga (Rp) *</label>
      <input type="number" min="0" name="price" class="form-control" required value="{{ product.price }}">
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label small fw-semibold text-secondary">Minimum Stok</label>
      <input type="number" min="0" name="min_stock" class="form-control" value="{{ product.min_stock }}">
    </div>
  </div>
  
  <div class="mb-4">
    <label class="form-label small fw-semibold text-secondary">Supplier</label>
    <select name="supplier_id" class="form-select">
      <option value="">Pilih supplier (opsional)</option>
      {% for s in suppliers %}
        <option value="{{ s.id_supplier }}" {{ 'selected' if product.supplier_id == s.id_supplier else '' }}>
          {{ s.nama }} (ID: {{ s.id_supplier }})
        </option>
      {% endfor %}
    </select>
  </div>
  
  <div class="d-flex justify-content-between align-items-center">
    <a href="/index.php" class="btn btn-glass-secondary">Kembali</a>
    <button class="btn btn-glass-primary" type="submit">Simpan Perubahan</button>
  </div>
</form>
{% endblock %}
