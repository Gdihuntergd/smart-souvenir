<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>{{ page_title | default('Stock Viewing Web App') }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/v/bs5/dt-2.0.7/datatables.min.css" rel="stylesheet"/>
  <link href="{{ url_for('stock.static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body>
<div class="blob-c">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<nav class="navbar navbar-expand-lg glass-nav sticky-top mx-3 my-3 rounded-4 shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand d-flex align-items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #6366f1;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      <span>Smart Stock</span>
    </span>
    {% if session.get('is_admin') %}
      <div class="d-flex align-items-center gap-3 ms-auto">
        {% set display_name = 'Admin' %}
        {% if session.get('user_name') %}
          {% set display_name = session.get('user_name') ~ ' (' ~ session.get('user_level') ~ ')' %}
        {% endif %}
        <span class="text-secondary small fw-semibold">
          {{ display_name }}
        </span>
        <a href="{{ url_for('stock.logout') }}" class="btn btn-sm btn-glass-secondary py-1 px-3">Logout</a>
      </div>
    {% endif %}
  </div>
</nav>
<div class="container my-4">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/v/bs5/dt-2.0.7/datatables.min.js"></script>
<script src="{{ url_for('stock.static', filename='js/app.js') }}"></script>
</body>
</html>
